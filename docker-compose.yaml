services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=bukashki
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432" # host:container
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d bukashki" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./bukashki/sql/01.sql:/docker-entrypoint-initdb.d/01.sql

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # api
      - "9001:9001" # web panel
    environment:
      MINIO_ROOT_USER: miniouser
      MINIO_ROOT_PASSWORD: miniopass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: ./bukashki
    ports:
      - "8080:8080" # host:container
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bukashki
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pass
      - MINIO_URL=http://minio:9000
      - MINIO_PUBLICURL=http://localhost:9000
      - MINIO_USERNAME=miniouser
      - MINIO_PASSWORD=miniopass
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
